name: BSRpgSkills
version: '${version}'
main: kr.yongpyo.bsrpgskills.BSRpgSkills
api-version: '1.21'
description: 'MMOItems 무기 기반 6슬롯 스킬 + 패시브 시스템'
author: yongpyo

depend:
  - MythicMobs
  - MMOItems
  - MythicLib

softdepend:
  - PlaceholderAPI
  - MMOCore
  - WorldGuard

commands:
  bsrpgskills:
    description: 'BSRpgSkills 관리/스킬 명령어'
    usage: '/<command> <editor|reload|list|info|save|debug|debuglog|validate|point|setlevel|skills>'

permissions:
  bsrpgskills.admin:
    description: '관리자 명령어(editor/reload/save/info/list/validate/point/setlevel/debug 등)'
    default: op
  bsrpgskills.use:
    description: '전투 모드 + 스킬 강화 GUI 접근'
    default: true
