name: BSRpgSkills
version: '${version}'
main: kr.yongpyo.bsrpgskills.BSRpgSkills
api-version: '1.21'
description: 'MMOItems 무기 기반 6슬롯 스킬 + 패시브 시스템'
author: yongpyo

depend:
  - MythicMobs
  - MMOItems
  - MythicLib

softdepend:
  - PlaceholderAPI
  - MMOCore

commands:
  bsrpgskills:
    description: 'BSRpgSkills 관리 명령어'
    usage: '/<command> <editor|reload|list|info|toggle|save|debug|debuglog>'
    permission: bsrpgskills.admin

permissions:
  bsrpgskills.admin:
    description: '관리자 명령어 사용'
    default: op
  bsrpgskills.use:
    description: '전투 모드 사용'
    default: true
