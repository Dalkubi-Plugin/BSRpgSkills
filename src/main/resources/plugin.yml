name: BSSkill
version: '${version}'
main: kr.yongpyo.bsskill.BSSkill
api-version: '1.21'
description: 'MMOItems 무기 기반 6슬롯 스킬 + 패시브 시스템'
author: yongpyo

depend:
  - CommandAPI
  - MythicMobs
  - MMOItems
  - MythicLib

softdepend:
  - PlaceholderAPI
  - MMOCore

commands:
  bsskill:
    description: 'BSSkill 관리 명령어'
    usage: '/<command> <editor|reload|list|info|toggle|save>'
    permission: bsskill.admin

permissions:
  bsskill.admin:
    description: '관리자 명령어 사용'
    default: op
  bsskill.use:
    description: '전투 모드 토글'
    default: true
