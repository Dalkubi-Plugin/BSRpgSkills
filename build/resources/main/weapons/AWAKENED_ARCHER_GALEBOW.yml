# ========================================
#  AWAKENED_ARCHER_GALEBOW
#  파일명 = MMOITEMS_ITEM_ID (자동 매칭)
# ========================================
# 슬롯 키 매핑:
#   slot-1: 좌클릭  |  slot-2: 우클릭
#   slot-3: 1키     |  slot-4: 2키
#   slot-5: 3키     |  slot-6: 4키
# 무기: 항상 핫바 9번(키보드 9)에 고정

display-name: "<gradient:#00ff2a:#e1ff75:#00ff2a>Galebow</gradient>"

# ── 액티브 스킬 (6슬롯) ──
skills:
  slot-1:
    mythic-id: BLASTING_COMBO
    display-name: "<yellow>폭발 콤보</yellow>"
    cooldown: 0.3
    damage: 5
    icon: BLAZE_POWDER
    description: "좌클릭으로 폭발 콤보를 시전합니다."
    enabled: true

  slot-2:
    mythic-id: EVASIVE_SHOT
    display-name: "<aqua>회피 사격</aqua>"
    cooldown: 2
    damage: 5
    icon: SPECTRAL_ARROW
    description: "후방으로 도약하며 화살을 발사합니다."
    enabled: true

  slot-3:
    mythic-id: VOLLEY_OF_ARROWS
    display-name: "<gold>화살 일제 사격</gold>"
    cooldown: 3
    damage: 5
    icon: ARROW
    description: "전방에 화살 비를 퍼붓습니다."
    enabled: true

  slot-4:
    mythic-id: RAPID_ARROWS
    display-name: "<red>속사</red>"
    cooldown: 3
    damage: 5
    icon: BOW
    description: "빠르게 연사합니다."
    enabled: true

  slot-5:
    mythic-id: SHOT_OF_DESTRUCTION
    display-name: "<dark_red>파괴의 일격</dark_red>"
    cooldown: 7
    damage: 40
    icon: TNT
    description: "초강력 일격을 날립니다."
    enabled: true

  slot-6:
    mythic-id: PIERCING_SKYFALL
    display-name: "<light_purple>관통 천격</light_purple>"
    cooldown: 3
    damage: 6
    icon: TRIDENT
    description: "하늘에서 관통 화살이 쏟아집니다."
    enabled: true

# ── 패시브 (TIMER 자동 발동) ──
# 전투 모드 + 무기를 들고 있을 때 timer 주기마다 자동 시전
# 모든 키값이 registerModifier로 MythicMobs에 전달됨
passives:
  passive1:
    type: AMBUSH
    timer: 10
    cooldown: 0
