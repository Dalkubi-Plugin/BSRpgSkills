# BSSkill v4.0.2 Configuration

use-actionbar: true
actionbar-interval: 5

sounds:
  combat-on: ""
  combat-off: ""
  skill-cast: ""
  cooldown-deny: ""
  return-weapon: ""

messages:
  combat-on: "<gradient:red:gold>전투 모드 ON</gradient> <yellow>{weapon}</yellow>"
  combat-off: "<gradient:gray:dark_gray>전투 모드 OFF</gradient>"
  no-weapon: "<red>등록된 무기를 손에 들고 있어야 합니다.</red>"
  weapon-lost: "<red>무기가 사라져 전투 모드가 해제되었습니다.</red>"
  cooldown: "<red>쿨타임 {remaining}초</red>"
  skill-cast: ""
  no-skill: "<gray>해당 슬롯에 스킬이 없습니다.</gray>"
  cast-failed: "<red>스킬 시전 실패</red>"
  return-weapon: "<yellow>무기로 복귀</yellow>"
